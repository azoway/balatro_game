<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小丑牌 · JOKER</title>
<meta name="theme-color" content="#0a1a16">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">

  <!-- ===== 左侧信息面板 ===== -->
  <aside id="sidebar">
    <div class="panel blind-panel" id="blind-panel">
      <div class="blind-name" id="blind-name">小盲注</div>
      <div class="blind-body">
        <div class="blind-chip" id="blind-chip"></div>
        <div class="blind-info">
          <div class="blind-target-label">目标分数</div>
          <div class="blind-target" id="blind-target">300</div>
          <div class="blind-reward" id="blind-reward"></div>
        </div>
      </div>
      <div class="blind-effect hidden" id="blind-effect"></div>
    </div>

    <div class="panel score-panel">
      <div class="score-label">回合分数</div>
      <div class="round-score" id="round-score">0</div>
    </div>

    <div class="panel hand-panel">
      <div class="hand-name" id="hand-name">&nbsp;</div>
      <div class="calc">
        <div class="chips-box" id="chips-box">0</div>
        <div class="times">×</div>
        <div class="mult-box" id="mult-box">0</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="panel stat">
        <div class="stat-label">出牌</div>
        <div class="stat-value blue" id="hands-left">4</div>
      </div>
      <div class="panel stat">
        <div class="stat-label">弃牌</div>
        <div class="stat-value red" id="discards-left">3</div>
      </div>
    </div>

    <div class="panel money-panel">
      <div class="money" id="money">$4</div>
    </div>

    <div class="stats-row">
      <div class="panel stat">
        <div class="stat-label">底注</div>
        <div class="stat-value orange"><span id="ante">1</span><span class="dim">/8</span></div>
      </div>
      <div class="panel stat">
        <div class="stat-label">回合</div>
        <div class="stat-value orange" id="round">0</div>
      </div>
    </div>

    <button class="small-btn" id="run-info-btn">牌型等级</button>
    <button class="small-btn" id="new-run-btn">重新开局</button>
    <button class="small-btn" id="daily-btn">今日挑战</button>
    <div class="hotkeys seed-line" id="seed-line" title="点击输入自定义种子">种子 -</div>
    <div class="hotkeys">快捷键: 1-9选牌 · Enter出牌 · X弃牌 · R/S排序 · M静音 · 计分中点击加速</div>
  </aside>

  <!-- ===== 主区域 ===== -->
  <main id="main">
    <div id="joker-row">
      <div id="joker-sec">
        <div class="row-label">小丑牌 <span id="joker-count">0/5</span></div>
        <div id="jokers"></div>
      </div>
      <div id="consumable-sec">
        <div class="row-label">消耗品 <span id="consumable-count">0/2</span></div>
        <div id="consumables"></div>
      </div>
    </div>

    <div id="play-area"></div>

    <div id="hand-area">
      <div id="hand"></div>
      <div id="deck-info">牌库 <span id="deck-count">44/52</span></div>
    </div>

    <div id="controls">
      <button class="btn btn-blue" id="play-btn" disabled>出牌</button>
      <div id="sort-btns">
        <div class="sort-label">排序</div>
        <button class="btn btn-orange small" id="sort-rank">点数</button>
        <button class="btn btn-orange small" id="sort-suit">花色</button>
      </div>
      <button class="btn btn-red" id="discard-btn" disabled>弃牌</button>
    </div>
  </main>

  <!-- ===== 盲注选择 ===== -->
  <div class="overlay" id="blind-select">
    <div class="overlay-title">选择盲注</div>
    <div id="blind-options"></div>
  </div>

  <!-- ===== 商店 ===== -->
  <div class="overlay hidden" id="shop">
    <div class="shop-box">
      <div class="shop-header">🛒 商 店</div>
      <div id="shop-items"></div>
      <div class="shop-footer">
        <button class="btn btn-red" id="reroll-btn">刷新 $5</button>
        <button class="btn btn-orange" id="next-round-btn">下一回合 ➜</button>
      </div>
    </div>
  </div>

  <!-- ===== 牌型等级 ===== -->
  <div class="overlay hidden" id="run-info">
    <div class="shop-box">
      <div class="shop-header">牌型等级</div>
      <div id="hand-levels"></div>
      <div class="shop-footer">
        <button class="btn btn-orange" id="close-info-btn">返回</button>
      </div>
    </div>
  </div>

  <!-- ===== 回合结算 ===== -->
  <div class="overlay hidden" id="cashout">
    <div class="shop-box">
      <div class="shop-header gold">回合胜利!</div>
      <div id="cashout-lines"></div>
      <div class="shop-footer">
        <button class="btn btn-orange big" id="cashout-btn">收取</button>
      </div>
    </div>
  </div>

  <!-- ===== 结算画面 ===== -->
  <div class="overlay hidden" id="end-screen">
    <div class="end-box" id="end-box">
      <div class="end-title" id="end-title">游戏结束</div>
      <div class="end-detail" id="end-detail"></div>
      <button class="btn btn-orange big hidden" id="endless-btn">♾️ 无尽模式</button>
      <button class="btn btn-blue big" id="restart-btn">再来一局</button>
    </div>
  </div>

  <div id="tooltip" class="hidden"></div>
</div>
<script src="defs.js"></script>
<script src="engine.js"></script>
<script src="ui.js"></script>
</body>
</html>
